<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>Metalmen</title>
    <style>
        :root { color-scheme: light !important; }
        html, body {
            color-scheme: light !important;
            background: #ffffff !important;
            color: #111111 !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            line-height: 1.6; 
            color: #111; 
            background: #fff;
        }

        nav {
            background: #fff;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 18px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 rgba(0,0,0,0.08);
        }
        .logo img { height: 48px; }
        
        .nav-links {
            display: flex;
            gap: 38px;
            font-weight: 500;
            font-size: 1.03rem;
            align-items: center;
        }
        
        .nav-links a {
            color: #111;
            text-decoration: none;
            padding: 12px 0;
            white-space: nowrap;
        }
        .nav-links a:hover { color: #0066cc; }

        /* Products Dropdown */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #fff;
            min-width: 260px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            border-radius: 10px;
            padding: 18px 0;
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dropdown:hover .dropdown-content {
            display: block;
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .dropdown-content a {
            display: block;
            padding: 12px 28px;
            color: #111;
            text-decoration: none;
            transition: all 0.2s;
        }
        .dropdown-content a:hover {
            background: #f0f7ff;
            color: #0066cc;
            padding-left: 34px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: #0066cc;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 60px 20px 30px;
            margin-top: 120px;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { background: #0052a3; transform: translateY(-3px); }

        @media (max-width: 992px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                background: #fff;
                padding: 20px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
            .nav-links.active { display: flex; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Metalmen" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
            <strong style="color:#111;font-size:24px;font-weight:700;display:none;">METALMEN</strong>
        </a>
        
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            
            <div class="dropdown">
                <a href="/services">Products</a>
                <div class="dropdown-content">
                    <a href="/services#ferrous">Ferrous</a>
                    <a href="/services#nonferrous">Non-Ferrous</a>
                    <a href="/services#semifinished">Semi-Finished</a>
                    <a href="/services#wastepaper">Waste Paper</a>
                    <a href="/services#plastics">Plastics</a>
                </div>
            </div>

            <a href="/gallery">Gallery</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2026 Metalmen. All rights reserved. | Traceable • Sustainable • Global</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
    </script>
</body>
</html>
